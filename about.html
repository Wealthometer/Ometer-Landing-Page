<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>About Ometer — How It Was Built</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=DM+Sans:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#08090C;--ink2:#0F1117;--ink3:#161B26;
  --lime:#D4FF00;--lime2:#AACC00;--lime-d:#2A3300;
  --slate:#8896A8;--fog:#C8D4E0;--white:#F4F8FF;
  --border:#1E2535;
}
html{scroll-behavior:smooth}
body{background:var(--ink);color:var(--white);font-family:'DM Sans',sans-serif;font-weight:300;overflow-x:hidden}
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.1) 2px,rgba(0,0,0,.1) 3px);
  opacity:.3;
}
.z{position:relative;z-index:1}

/* NAV */
nav{
  position:fixed;top:0;left:0;right:0;z-index:300;
  height:58px;display:flex;align-items:center;padding:0 48px;
  border-bottom:1px solid transparent;
  transition:background .3s,border-color .3s;
}
nav.stuck{background:rgba(8,9,12,.93);backdrop-filter:blur(16px);border-color:var(--border)}
.nav-logo{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:.06em;color:var(--lime);text-decoration:none}
.nav-logo b{color:var(--white);font-weight:400}
.nav-c{display:flex;gap:32px;position:absolute;left:50%;transform:translateX(-50%)}
.nav-c a{font-family:'DM Mono',monospace;font-size:.72rem;color:var(--slate);text-decoration:none;letter-spacing:.06em;text-transform:uppercase;transition:color .2s}
.nav-c a:hover,.nav-c a.on{color:var(--lime)}
.nav-r{margin-left:auto;display:flex;gap:12px;align-items:center}
.btn-o{font-family:'DM Mono',monospace;font-size:.72rem;font-weight:500;letter-spacing:.06em;padding:8px 20px;border-radius:2px;text-decoration:none;border:1px solid var(--border);color:var(--slate);transition:all .2s}
.btn-o:hover{border-color:var(--lime);color:var(--lime)}
