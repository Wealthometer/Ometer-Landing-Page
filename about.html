<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>About Ometer — How It Was Built</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=DM+Sans:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#08090C;--ink2:#0F1117;--ink3:#161B26;
  --lime:#D4FF00;--lime2:#AACC00;--lime-d:#2A3300;
  --slate:#8896A8;--fog:#C8D4E0;--white:#F4F8FF;
  --border:#1E2535;
}
html{scroll-behavior:smooth}
body{background:var(--ink);color:var(--white);font-family:'DM Sans',sans-serif;font-weight:300;overflow-x:hidden}
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.1) 2px,rgba(0,0,0,.1) 3px);
  opacity:.3;
}
.z{position:relative;z-index:1}

/* NAV */
nav{
  position:fixed;top:0;left:0;right:0;z-index:300;
  height:58px;display:flex;align-items:center;padding:0 48px;
  border-bottom:1px solid transparent;
  transition:background .3s,border-color .3s;
}
nav.stuck{background:rgba(8,9,12,.93);backdrop-filter:blur(16px);border-color:var(--border)}
.nav-logo{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:.06em;color:var(--lime);text-decoration:none}
.nav-logo b{color:var(--white);font-weight:400}
.nav-c{display:flex;gap:32px;position:absolute;left:50%;transform:translateX(-50%)}
.nav-c a{font-family:'DM Mono',monospace;font-size:.72rem;color:var(--slate);text-decoration:none;letter-spacing:.06em;text-transform:uppercase;transition:color .2s}
.nav-c a:hover,.nav-c a.on{color:var(--lime)}
.nav-r{margin-left:auto;display:flex;gap:12px;align-items:center}
.btn-o{font-family:'DM Mono',monospace;font-size:.72rem;font-weight:500;letter-spacing:.06em;padding:8px 20px;border-radius:2px;text-decoration:none;border:1px solid var(--border);color:var(--slate);transition:all .2s}
.btn-o:hover{border-color:var(--lime);color:var(--lime)}
.btn-s{background:var(--lime);color:var(--ink);font-weight:600}
.btn-s:hover{background:var(--white)}

/* HERO */
.about-hero{
  padding:140px 48px 100px;
  max-width:1200px;margin:0 auto;
  display:grid;grid-template-columns:1fr 1fr;gap:80px;align-items:center;
}
.ah-eyebrow{
  font-family:'DM Mono',monospace;font-size:.65rem;
  color:var(--lime);letter-spacing:.12em;text-transform:uppercase;
  border:1px solid var(--lime-d);padding:4px 14px;border-radius:2px;
  display:inline-block;margin-bottom:24px;
}
.ah-title{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(3.5rem,7vw,6.5rem);
  line-height:.92;letter-spacing:.02em;
}
.ah-title span{color:var(--lime);display:block}
.ah-sub{color:var(--slate);font-size:1.05rem;line-height:1.8;margin-top:24px;max-width:480px}
.ah-meta{
  display:flex;gap:32px;margin-top:40px;
  padding-top:32px;border-top:1px solid var(--border);
}
.meta-item{}
.meta-label{font-family:'DM Mono',monospace;font-size:.62rem;color:var(--slate);letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px}
.meta-val{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;color:var(--lime);letter-spacing:.04em}

/* TECH STACK VISUAL */
.stack-visual{position:relative}
.stack-box{
  background:var(--ink2);border:1px solid var(--border);
  border-radius:8px;overflow:hidden;
  box-shadow:0 24px 60px rgba(0,0,0,.6);
}
.stack-row{
  display:flex;align-items:center;gap:16px;
  padding:16px 20px;border-bottom:1px solid var(--border);
  transition:background .2s;
}
.stack-row:last-child{border-bottom:none}
.stack-row:hover{background:var(--ink3)}
.stack-idx{
  font-family:'Bebas Neue',sans-serif;font-size:1.2rem;
  color:var(--lime-d);width:24px;flex-shrink:0;
}
.stack-name{font-family:'DM Mono',monospace;font-size:.82rem;color:var(--white);flex:1}
.stack-file{font-family:'DM Mono',monospace;font-size:.68rem;color:var(--slate)}
.stack-status{
  font-family:'DM Mono',monospace;font-size:.62rem;
  background:rgba(212,255,0,.1);color:var(--lime);
  padding:3px 10px;border-radius:2px;border:1px solid var(--lime-d);
}

/* SECTIONS */
.section{padding:80px 48px;max-width:1200px;margin:0 auto}
.section-full{padding:80px 48px;border-top:1px solid var(--border)}
.section-full-inner{max-width:1200px;margin:0 auto}

.eyebrow{font-family:'DM Mono',monospace;font-size:.65rem;color:var(--lime);letter-spacing:.12em;text-transform:uppercase;margin-bottom:14px}
.big-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(2.8rem,5vw,4.5rem);letter-spacing:.02em;line-height:.95;margin-bottom:20px}
.body-text{color:var(--slate);font-size:.95rem;line-height:1.85;max-width:680px;margin-bottom:16px}

/* CHAPTER LAYOUT */
.chapter{
  display:grid;grid-template-columns:200px 1fr;gap:60px;
  padding:56px 0;border-bottom:1px solid var(--border);
  align-items:start;
}
.chapter:last-child{border-bottom:none}
.ch-num{
  font-family:'Bebas Neue',sans-serif;font-size:5rem;
  color:var(--lime-d);line-height:1;letter-spacing:.02em;
  position:sticky;top:80px;
}
.ch-content h3{
  font-family:'Bebas Neue',sans-serif;font-size:2rem;
  letter-spacing:.03em;margin-bottom:16px;color:var(--lime);
}
.ch-content p{color:var(--slate);font-size:.93rem;line-height:1.85;margin-bottom:14px}
.ch-content p strong{color:var(--white);font-weight:600}
.ch-content pre{
  background:var(--ink2);border:1px solid var(--border);
  border-radius:6px;padding:20px;font-family:'DM Mono',monospace;
  font-size:.78rem;line-height:1.8;overflow-x:auto;margin:16px 0;
}
.ch-content pre .cm{color:#3A4A5A;font-style:italic}
.ch-content pre .kw{color:#C792EA}
.ch-content pre .fn{color:#82AAFF}
.ch-content pre .str{color:#C3E88D}
.ch-content pre .num{color:#F78C6C}
.ch-content pre .lime{color:var(--lime)}

/* DECISION TABLE */
.decision-grid{
  display:grid;grid-template-columns:1fr 1fr;gap:2px;
  margin:20px 0;
}
.d-card{background:var(--ink2);border:1px solid var(--border);padding:20px 18px}
.d-q{font-family:'DM Mono',monospace;font-size:.7rem;color:var(--slate);margin-bottom:8px;letter-spacing:.03em}
.d-a{font-family:'DM Sans',sans-serif;font-size:.88rem;color:var(--white);line-height:1.6}
.d-a b{color:var(--lime);font-weight:600}

/* TIMELINE */
.timeline{position:relative;padding-left:32px;margin:24px 0}
.timeline::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--border)}
.tl-item{position:relative;margin-bottom:28px}
.tl-item::before{
  content:'';position:absolute;left:-37px;top:4px;
  width:10px;height:10px;border-radius:50%;
  background:var(--lime);border:2px solid var(--ink);
}
.tl-label{font-family:'DM Mono',monospace;font-size:.68rem;color:var(--lime);margin-bottom:4px;letter-spacing:.05em}
.tl-text{color:var(--slate);font-size:.88rem;line-height:1.7}

/* FILE TABLE */
.file-grid{display:flex;flex-direction:column;gap:2px;margin:20px 0}
.file-row{
  display:flex;align-items:center;gap:16px;
  background:var(--ink2);border:1px solid var(--border);
  padding:14px 18px;
}
.file-name{font-family:'DM Mono',monospace;font-size:.82rem;color:var(--lime);flex:0 0 180px}
.file-size{font-family:'DM Mono',monospace;font-size:.68rem;color:var(--slate);flex:0 0 60px}
.file-desc{font-size:.83rem;color:var(--slate)}

/* PRINCIPLES */
.principles{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;margin:24px 0}
.p-card{background:var(--ink2);border:1px solid var(--border);padding:28px 22px}
.p-n{font-family:'Bebas Neue',sans-serif;font-size:2.5rem;color:var(--lime-d);margin-bottom:10px}
.p-title{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;letter-spacing:.04em;margin-bottom:10px;color:var(--lime)}
.p-text{color:var(--slate);font-size:.83rem;line-height:1.7}

/* CTA */
.cta{
  text-align:center;padding:100px 48px;
  border-top:1px solid var(--border);
  position:relative;overflow:hidden;
}
.cta::before{
  content:'BUILD';
  position:absolute;font-family:'Bebas Neue',sans-serif;
  font-size:28vw;color:transparent;
  -webkit-text-stroke:1px var(--border);
  top:50%;left:50%;transform:translate(-50%,-50%);
  pointer-events:none;letter-spacing:.05em;white-space:nowrap;
}
.cta h2{font-family:'Bebas Neue',sans-serif;font-size:clamp(3rem,6vw,5rem);letter-spacing:.02em;line-height:.95;position:relative}
.cta h2 span{color:var(--lime);display:block}
.cta p{color:var(--slate);font-size:1rem;margin:18px 0 36px;position:relative}
.btn-p{
  font-family:'DM Mono',monospace;font-size:.85rem;font-weight:600;
  background:var(--lime);color:var(--ink);
  padding:14px 36px;border-radius:2px;text-decoration:none;
  display:inline-flex;transition:all .2s;
}
.btn-p:hover{background:var(--white);transform:translateY(-2px)}

/* FOOTER */
footer{
  border-top:1px solid var(--border);padding:36px 48px;
  display:flex;align-items:center;justify-content:space-between;
}
footer p{font-family:'DM Mono',monospace;font-size:.68rem;color:var(--slate)}
.fl{display:flex;gap:28px}
.fl a{font-family:'DM Mono',monospace;font-size:.68rem;color:var(--slate);text-decoration:none;transition:color .2s}
.fl a:hover{color:var(--lime)}

@media(max-width:900px){
  nav{padding:0 24px}.nav-c{display:none}
  .about-hero{grid-template-columns:1fr;padding:110px 24px 60px;gap:40px}
  .section,.section-full{padding:60px 24px}
  .chapter{grid-template-columns:1fr;gap:20px}
  .ch-num{font-size:3rem;position:static}
  .decision-grid{grid-template-columns:1fr}
  .principles{grid-template-columns:1fr}
  footer{flex-direction:column;gap:16px;padding:28px 24px;text-align:center}
}
</style>
</head>
