<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ometer — The Web Language Built Different</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=DM+Sans:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root {
  --ink:    #08090C;
  --ink2:   #0F1117;
  --ink3:   #161B26;
  --lime:   #D4FF00;
  --lime2:  #AACC00;
  --lime-d: #2A3300;
  --slate:  #8896A8;
  --fog:    #C8D4E0;
  --white:  #F4F8FF;
  --red:    #FF3B30;
  --border: #1E2535;
  --w: 1200px;
}

html { scroll-behavior: smooth; }

body {
  background: var(--ink);
  color: var(--white);
  font-family: 'DM Sans', sans-serif;
  font-weight: 300;
  overflow-x: hidden;
}

/* ─── SCANLINE TEXTURE ─────────────────────────────── */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.12) 2px,
    rgba(0,0,0,0.12) 3px
  );
  opacity: 0.35;
}

.z1 { position: relative; z-index: 1; }

/* ─── NAV ──────────────────────────────────────────── */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 500;
  height: 58px;
  display: flex; align-items: center;
  padding: 0 48px;
  border-bottom: 1px solid transparent;
  transition: background .3s, border-color .3s;
}
nav.stuck {
  background: rgba(8,9,12,.92);
  backdrop-filter: blur(16px);
  border-color: var(--border);
}
.nav-logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.6rem;
  letter-spacing: .06em;
  color: var(--lime);
  text-decoration: none;
  line-height: 1;
}
.nav-logo b { color: var(--white); font-weight: 400; }
.nav-center {
  display: flex; gap: 32px;
  position: absolute; left: 50%; transform: translateX(-50%);
}
.nav-center a {
  font-family: 'DM Mono', monospace;
  font-size: .72rem;
  color: var(--slate);
  text-decoration: none;
  letter-spacing: .06em;
  text-transform: uppercase;
  transition: color .2s;
}
.nav-center a:hover, .nav-center a.active { color: var(--lime); }
.nav-right { margin-left: auto; display: flex; gap: 12px; align-items: center; }
.btn-nav {
  font-family: 'DM Mono', monospace;
  font-size: .72rem;
  font-weight: 500;
  letter-spacing: .06em;
  padding: 8px 20px;
  border-radius: 2px;
  text-decoration: none;
  transition: all .2s;
}
.btn-outline {
  border: 1px solid var(--border);
  color: var(--slate);
}
.btn-outline:hover { border-color: var(--lime); color: var(--lime); }
.btn-solid {
  background: var(--lime);
  color: var(--ink);
  font-weight: 600;
}
.btn-solid:hover { background: var(--white); }

/* ─── HERO ─────────────────────────────────────────── */
.hero {
  min-height: 100vh;
  padding: 130px 48px 80px;
  position: relative;
  display: grid;
  grid-template-columns: 1fr 520px;
  gap: 60px;
  align-items: center;
  max-width: var(--w);
  margin: 0 auto;
}

/* Animated grid bg */
.hero-bg {
  position: absolute; inset: 0; z-index: 0;
  background-image:
    linear-gradient(var(--border) 1px, transparent 1px),
    linear-gradient(90deg, var(--border) 1px, transparent 1px);
  background-size: 52px 52px;
  mask-image: radial-gradient(ellipse 80% 70% at 60% 40%, black 30%, transparent 100%);
  opacity: .5;
  animation: gridPulse 8s ease-in-out infinite;
}
@keyframes gridPulse {
  0%,100%{opacity:.4} 50%{opacity:.7}
}

.hero-eyebrow {
  display: inline-flex; align-items: center; gap: 10px;
  font-family: 'DM Mono', monospace;
  font-size: .68rem;
  color: var(--lime);
  letter-spacing: .1em;
  text-transform: uppercase;
  border: 1px solid var(--lime-d);
  padding: 5px 14px;
  border-radius: 2px;
  margin-bottom: 28px;
  opacity: 0; animation: up .5s .1s forwards;
}
.hero-eyebrow::before {
  content: '';
  width: 6px; height: 6px;
  background: var(--lime);
  border-radius: 50%;
  animation: blink 1.4s infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

.hero-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(4.5rem, 9vw, 8.5rem);
  line-height: .9;
  letter-spacing: .02em;
  opacity: 0; animation: up .6s .2s forwards;
}
.hero-title .accent { color: var(--lime); display: block; }
.hero-title .thin {
  -webkit-text-stroke: 1px rgba(244,248,255,.25);
  color: transparent;
  display: block;
}

.hero-sub {
  font-size: 1.05rem;
  color: var(--slate);
  line-height: 1.8;
  max-width: 480px;
  margin-top: 24px;
  opacity: 0; animation: up .6s .35s forwards;
}

.hero-actions {
  display: flex; gap: 12px; margin-top: 40px;
  opacity: 0; animation: up .6s .48s forwards;
}
.btn-hero-p {
  font-family: 'DM Mono', monospace;
  font-size: .85rem; font-weight: 500;
  background: var(--lime); color: var(--ink);
  padding: 14px 32px; border-radius: 2px;
  text-decoration: none; letter-spacing: .04em;
  transition: all .2s;
}
.btn-hero-p:hover { background: var(--white); transform: translateY(-2px); }
.btn-hero-s {
  font-family: 'DM Mono', monospace;
  font-size: .85rem;
  color: var(--slate);
  padding: 14px 32px; border-radius: 2px;
  text-decoration: none; letter-spacing: .04em;
  border: 1px solid var(--border);
  transition: all .2s;
}
.btn-hero-s:hover { border-color: var(--slate); color: var(--white); }

.hero-stats {
  display: flex; gap: 40px; margin-top: 56px;
  opacity: 0; animation: up .6s .6s forwards;
}
.stat-num {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 2.4rem;
  color: var(--lime);
  line-height: 1;
}
.stat-label {
  font-family: 'DM Mono', monospace;
  font-size: .65rem;
  color: var(--slate);
  letter-spacing: .08em;
  text-transform: uppercase;
  margin-top: 2px;
}

/* ─── CODE WINDOW ──────────────────────────────────── */
.code-panel {
  opacity: 0; animation: up .7s .3s forwards;
}
.win {
  background: var(--ink2);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
  box-shadow: 0 32px 80px rgba(0,0,0,.7), 0 0 0 1px var(--border), inset 0 1px 0 rgba(255,255,255,.04);
}
.win-bar {
  background: var(--ink3);
  padding: 13px 18px;
  display: flex; align-items: center; gap: 8px;
  border-bottom: 1px solid var(--border);
}
.dot { width: 11px; height: 11px; border-radius: 50%; }
.dr{background:#FF5F57}.dy{background:#FFBD2E}.dg{background:#28CA41}
.win-fname {
  margin-left: auto;
  font-family: 'DM Mono', monospace;
  font-size: .68rem;
  color: var(--slate);
}
.win-body { padding: 24px 22px; }
pre { font-family: 'DM Mono', monospace; font-size: .8rem; line-height: 1.85; tab-size: 2; }
.kw  { color: #C792EA; }
.fn  { color: #82AAFF; }
.str { color: #C3E88D; }
.num { color: #F78C6C; }
.cm  { color: #4A5568; font-style: italic; }
.op  { color: var(--lime); }
.pr  { color: #89DDFF; }

/* Typing cursor blink */
.cursor-blink::after {
  content: '▋';
  color: var(--lime);
  animation: blink 1s step-end infinite;
}

/* ─── TICKER ───────────────────────────────────────── */
.ticker {
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  overflow: hidden;
  padding: 14px 0;
  background: var(--ink2);
}
.ticker-inner {
  display: flex;
  animation: ticker 22s linear infinite;
  width: max-content;
  gap: 0;
}
.ticker-item {
  font-family: 'DM Mono', monospace;
  font-size: .7rem;
  color: var(--lime-d);
  padding: 0 48px;
  white-space: nowrap;
}
.ticker-item .h { color: var(--lime); }
@keyframes ticker { from{transform:translateX(0)} to{transform:translateX(-50%)} }

/* ─── SECTION BASE ─────────────────────────────────── */
.section { padding: 100px 48px; max-width: var(--w); margin: 0 auto; }
.eyebrow {
  font-family: 'DM Mono', monospace;
  font-size: .65rem;
  color: var(--lime);
  letter-spacing: .12em;
  text-transform: uppercase;
  margin-bottom: 14px;
}
.section-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(2.8rem, 5vw, 4.5rem);
  letter-spacing: .02em;
  line-height: .95;
  margin-bottom: 20px;
}
.section-sub {
  color: var(--slate);
  font-size: 1rem;
  line-height: 1.8;
  max-width: 520px;
  margin-bottom: 60px;
}

/* ─── FEATURES ─────────────────────────────────────── */
.features-wrap { border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
.features-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  border-left: 1px solid var(--border);
}
.feat {
  padding: 40px 32px;
  border-right: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  position: relative;
  transition: background .25s;
  overflow: hidden;
}
.feat:hover { background: var(--ink2); }
.feat::after {
  content: '';
  position: absolute; top: 0; left: 0; right: 0;
  height: 2px; background: var(--lime);
  transform: scaleX(0); transform-origin: left;
  transition: transform .3s;
}
.feat:hover::after { transform: scaleX(1); }
.feat-n {
  font-family: 'DM Mono', monospace;
  font-size: .6rem;
  color: var(--lime-d);
  letter-spacing: .1em;
  margin-bottom: 18px;
}
.feat-icon { font-size: 2rem; margin-bottom: 14px; display: block; }
.feat h3 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.4rem;
  letter-spacing: .04em;
  margin-bottom: 10px;
  color: var(--white);
}
.feat p { color: var(--slate); font-size: .88rem; line-height: 1.75; }

/* ─── PIPELINE ─────────────────────────────────────── */
.pipe-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  border: 1px solid var(--border);
  margin-top: 50px;
}
.pipe-step {
  padding: 36px 28px;
  border-right: 1px solid var(--border);
  position: relative;
}
.pipe-step:last-child { border-right: none; }
.pipe-arrow {
  position: absolute; right: -10px; top: 50%;
  transform: translateY(-50%);
  color: var(--lime);
  font-size: 1.2rem;
  font-family: 'DM Mono', monospace;
  z-index: 2;
}
.pipe-step:last-child .pipe-arrow { display: none; }
.pipe-n {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 3rem;
  color: var(--lime-d);
  line-height: 1;
  margin-bottom: 10px;
}
.pipe-name {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.3rem;
  color: var(--lime);
  letter-spacing: .04em;
  margin-bottom: 8px;
}
.pipe-desc { font-size: .82rem; color: var(--slate); line-height: 1.65; }
.pipe-tag {
  display: inline-block; margin-top: 16px;
  font-family: 'DM Mono', monospace;
  font-size: .6rem; color: var(--slate);
  background: var(--ink3);
  border: 1px solid var(--border);
  padding: 3px 10px; border-radius: 2px;
}

/* ─── DEMO SPLIT ───────────────────────────────────── */
.demo-split {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 72px;
  align-items: center;
}
.demo-text h2 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(2.5rem, 4vw, 3.8rem);
  letter-spacing: .02em;
  line-height: 1;
  margin-bottom: 18px;
}
.demo-text h2 span { color: var(--lime); }
.demo-text p { color: var(--slate); line-height: 1.8; font-size: .95rem; margin-bottom: 16px; }
.check-list { list-style: none; margin-top: 24px; display: flex; flex-direction: column; gap: 10px; }
.check-list li {
  display: flex; gap: 12px; align-items: flex-start;
  color: var(--slate); font-size: .9rem; line-height: 1.6;
}
.check-list li::before {
  content: '→';
  color: var(--lime);
  font-family: 'DM Mono', monospace;
  font-size: .75rem;
  flex-shrink: 0;
  margin-top: 3px;
}

/* ─── QUICKSTART ───────────────────────────────────── */
.qs-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 60px; }
.qs-steps { display: flex; flex-direction: column; gap: 28px; }
.qs-step { display: flex; gap: 18px; }
.qs-n {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.5rem;
  color: var(--lime);
  line-height: 1;
  flex-shrink: 0;
  width: 32px;
  text-align: center;
  padding-top: 2px;
}
