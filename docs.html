<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ometer Docs — Language Reference</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=DM+Sans:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#08090C;--ink2:#0F1117;--ink3:#161B26;
  --lime:#D4FF00;--lime2:#AACC00;--lime-d:#2A3300;
  --slate:#8896A8;--fog:#C8D4E0;--white:#F4F8FF;
  --border:#1E2535;--sb:272px;
}
html{scroll-behavior:smooth}
body{background:var(--ink);color:var(--white);font-family:'DM Sans',sans-serif;font-weight:300;display:flex;flex-direction:column;min-height:100vh}

/* NAV */
.topbar{
  position:fixed;top:0;left:0;right:0;z-index:300;
  height:56px;
  background:rgba(8,9,12,.95);
  backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 24px;gap:16px;
}
.topbar-logo{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;letter-spacing:.06em;color:var(--lime);text-decoration:none}
.topbar-logo b{color:var(--white);font-weight:400}
.topbar-sep{color:var(--border)}
.topbar-badge{font-family:'DM Mono',monospace;font-size:.68rem;color:var(--slate);letter-spacing:.04em}
.topbar-links{margin-left:auto;display:flex;gap:20px}
.topbar-links a{font-family:'DM Mono',monospace;font-size:.68rem;color:var(--slate);text-decoration:none;transition:color .2s}
