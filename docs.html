<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ometer Docs — Language Reference</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=DM+Sans:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#08090C;--ink2:#0F1117;--ink3:#161B26;
  --lime:#D4FF00;--lime2:#AACC00;--lime-d:#2A3300;
  --slate:#8896A8;--fog:#C8D4E0;--white:#F4F8FF;
  --border:#1E2535;--sb:272px;
}
html{scroll-behavior:smooth}
body{background:var(--ink);color:var(--white);font-family:'DM Sans',sans-serif;font-weight:300;display:flex;flex-direction:column;min-height:100vh}

/* NAV */
.topbar{
  position:fixed;top:0;left:0;right:0;z-index:300;
  height:56px;
  background:rgba(8,9,12,.95);
  backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 24px;gap:16px;
}
.topbar-logo{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;letter-spacing:.06em;color:var(--lime);text-decoration:none}
.topbar-logo b{color:var(--white);font-weight:400}
.topbar-sep{color:var(--border)}
.topbar-badge{font-family:'DM Mono',monospace;font-size:.68rem;color:var(--slate);letter-spacing:.04em}
.topbar-links{margin-left:auto;display:flex;gap:20px}
.topbar-links a{font-family:'DM Mono',monospace;font-size:.68rem;color:var(--slate);text-decoration:none;transition:color .2s}
.topbar-links a:hover{color:var(--lime)}
.topbar-links a.active{color:var(--lime)}

/* LAYOUT */
.layout{display:flex;padding-top:56px;flex:1}

/* SIDEBAR */
.sb{
  width:var(--sb);flex-shrink:0;
  position:fixed;top:56px;left:0;bottom:0;
  overflow-y:auto;
  background:var(--ink2);
  border-right:1px solid var(--border);
  padding:20px 0 40px;
  scrollbar-width:thin;
  scrollbar-color:var(--border) transparent;
}
.sb::-webkit-scrollbar{width:3px}
.sb::-webkit-scrollbar-thumb{background:var(--border)}
.sb-group{padding:0 16px;margin-bottom:4px}
.sb-heading{
  font-family:'DM Mono',monospace;font-size:.58rem;
  text-transform:uppercase;letter-spacing:.12em;
  color:var(--lime);
  padding:16px 8px 6px;
  border-top:1px solid var(--border);
  margin-top:4px;
}
.sb-group:first-child .sb-heading{border-top:none;margin-top:0}
.sb-link{
  display:block;
  font-family:'DM Mono',monospace;font-size:.72rem;
  color:var(--slate);text-decoration:none;
  padding:5px 8px;border-radius:2px;
  transition:all .15s;letter-spacing:.02em;
  margin-bottom:1px;
}
.sb-link:hover,.sb-link.on{background:var(--ink3);color:var(--white)}
.sb-link.on{color:var(--lime)}
.sb-sub .sb-link{font-size:.67rem;padding-left:20px}
.sb-version{
  padding:16px 24px 0;
  font-family:'DM Mono',monospace;font-size:.62rem;
  color:var(--lime-d);letter-spacing:.05em;
}
